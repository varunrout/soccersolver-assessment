services:

  # ── Backend — FastAPI on port 8000 ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Optional: set in a root .env file or pass on the command line
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CSV_PATH: /app/backend/data/players.csv
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Frontend — React (nginx) on port 3000 ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the Vite bundle at build time.
        # Points to the backend as seen from the user's browser (host network).
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
