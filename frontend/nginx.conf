server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets with long cache
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — all unmatched routes return index.html so React Router
    # handles /player/:id, /compare, /chat without a 404 from nginx.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
